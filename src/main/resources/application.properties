spring.application.name=aluguelCarro

# ─── Banco de dados PostgreSQL ────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aluguel_carro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
	
# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:aluguel-carro-senac-secret-key-muito-longa-para-ser-segura-2026}
jwt.expiracao-ms=86400000

# ─── Regras de negócio ────────────────────────────────────────────────────────
aluguel.estoque.minimo=1

spring.application.name=aluguelCarro

# ─── Banco de dados MySQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aluguel_carro?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Chave secreta para assinar os tokens (mínimo 32 caracteres para HMAC-SHA256)
jwt.secret=aluguel-carro-senac-secret-key-muito-longa-para-ser-segura-2026
# Tempo de expiração em milissegundos: 86400000 = 24 horas
jwt.expiracao-ms=86400000

# ─── Regras de negócio ────────────────────────────────────────────────────────
# Número mínimo de carros disponíveis que devem permanecer na frota.
# O sistema bloqueia novos aluguéis quando a quantidade disponível
# for igual ou menor a este valor. Use 0 para desativar o controle.
aluguel.estoque.minimo=1
